risks_and_mitigations:
  original_risks:
    - description: OpenCode task() API constraints limit plugin delegation
      likelihood: medium
      mitigation: Prototype task() call first; keep manual-instruction fallback
      outcome: Resolved. Implementation probes toolCtx.task and client.task, falls back to instruction envelope when unavailable.
    - description: Registry path changes break existing users
      likelihood: medium
      mitigation: Maintain absolute-path fallback; preserve current installs
      outcome: Resolved. resolvePath supports absolute, ~/, and relative paths; legacy entries continue to work.
    - description: Scope creep toward full standalone CLI
      likelihood: high
      mitigation: Enforce MVP boundaries and 400-line review budget
      outcome: Resolved. CLI wrapper remains a minimal parser/router; no standalone binary introduced.
    - description: Plugin tests lack framework
      likelihood: low
      mitigation: Add minimal Node test harness in package.json
      outcome: Resolved. Vitest-based plugin unit tests and YAML scenario runner added.

  residual_risks:
    - description: task() API signature unconfirmed in production OpenCode runtime
      likelihood: low
      impact: medium
      mitigation: Runtime probe + deterministic fallback preserves usability
    - description: Existing consumers may expect old text-only odf_delegate output
      likelihood: low
      impact: low
      mitigation: Fallback path preserves old format; success path is a documented change
    - description: Engram mirror is agent-driven, not programmatically verified
      likelihood: low
      impact: low
      mitigation: OpenSpec is the default source of truth; Engram mirror is optional

lessons_learned:
  technical:
    - lesson: Preflight state is simpler as a single state.yaml file than a separate preflight.yaml
      evidence: Kept one state file under openspec/changes/{change}/state.yaml matching the orchestrator persistence contract
    - lesson: Pure helper modules (scripts/lib/orchestrator.js, scripts/lib/preflight.js) enable deterministic YAML and unit tests
      evidence: State machine and validation logic extracted from markdown into tested JavaScript helpers
    - lesson: Relative registry paths make the pack portable across machines without breaking legacy installs
      evidence: Mixed relative/absolute entries resolve independently; validator confirms every path exists
    - lesson: A minimal CLI wrapper can parse commands without invoking OpenCode directly
      evidence: scripts/odf-cli.js emits orchestrator routing envelopes only
  process:
    - lesson: Feature-branch-chain strategy is essential when slices exceed the 400-line review budget
      evidence: Each slice targeted the previous PR branch to keep reviewer diffs focused
    - lesson: Manual smoke tests for chat-native commands require a live OpenCode environment
      evidence: Fallback envelope and task() invocation paths covered by unit tests; full /odf-new chat path deferred to user environment
    - lesson: Installer tests need environment overrides to stay fast and deterministic
      evidence: Added ODF_SKIP_NPM and ODF_SKIP_SELFTEST to avoid network/full npm cycles in CI
  suggestions_for_future_changes:
    - Add registry-refresh synchronization test to keep commands array in sync with command/*.md files
    - Support --key=value flag syntax in scripts/odf-cli.js tokenizer
    - Add end-to-end EXPLORE routing YAML scenario
    - Consider skipping source archive download in install.sh --dry-run when ODF_SOURCE_DIR is not set
    - Add openspec/ and package.json to install.sh backup for full rollback coverage

