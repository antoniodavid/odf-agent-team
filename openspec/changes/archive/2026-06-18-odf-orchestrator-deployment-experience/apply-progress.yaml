deviations_from_design:
  - description: Preflight stored inside state.yaml instead of separate preflight.yaml
    reason: The design.yaml and tasks.yaml specify state.yaml with a preflight key; keeping one state file avoids duplication and matches the orchestrator persistence contract.
  - description: Added scripts/lib/orchestrator.js helper not explicitly in design
    reason: Pure state-machine functions are needed for deterministic YAML/unit tests and keep the orchestrator markdown thin.
  - description: Command wrappers updated in Slice 2 instead of Slice 3
    reason: User instructions explicitly requested command routing and registry command bindings as part of Slice 2 to wire the orchestrator end-to-end.
  - description: Orchestrator markdown kept mostly English with Spanish user-facing examples
    reason: The file is a technical agent artifact; only user-facing prompts/summaries are required to be Spanish per user instruction.
  - description: Added ODF_SKIP_NPM and ODF_SKIP_SELFTEST environment overrides to install.sh
    reason: Required to keep installer unit/YAML tests fast and deterministic in CI without network or a full npm install cycle.
  - description: install.sh copies openspec/ into the target directory
    reason: The odf-preflight capability entry references openspec/specs/odf-preflight/spec.yaml; copying the directory lets the registry validator confirm the path exists after install.
  - description: Registry registers only a curated subset of OCA skills
    reason: The OCA index lists 126 specialized skills; the registry includes the actively used ones to keep plugin load small. The full index remains available in skills/oca/SKILL.md.
  - description: Manual /odf-new smoke test not executed in live OpenCode chat
    reason: The environment is headless; the fallback envelope and task() invocation paths are covered by unit tests, and the installer/registry validation confirm deployment correctness.

