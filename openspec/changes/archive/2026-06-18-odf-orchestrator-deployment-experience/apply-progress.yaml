risks:
  - description: task() API signature unconfirmed in production OpenCode runtime
    mitigation: Runtime probe + deterministic fallback preserves usability.
  - description: Existing consumers may expect old text-only odf_delegate output
    mitigation: Fallback path preserves old format; success path is a documented change.
  - description: EXPLORE phase now allowed in plugin but orchestrator/agent expectations may differ
    mitigation: Agent markdown and command docs both specify phase=EXPLORE; unit test verifies delegation to odoo_functional_consultant.
  - description: CLI wrapper is minimal and does not invoke OpenCode directly
    mitigation: Documented as parsing/orchestrator-router only; full invocation still goes through OpenCode chat /odf-* commands.
  - description: Command markdown files rewritten in Slice 3 may conflict with Slice 2 versions in pending PRs
    mitigation: Slice 3 PR targets the feature branch after Slice 2 merges; review diff carefully for conflicts.
  - description: Version bump to 1.1.0 must be consistent across all manifest files
