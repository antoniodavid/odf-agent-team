deviations_from_design:
  - description: Preflight stored inside state.yaml instead of separate preflight.yaml
    reason: The design.yaml and tasks.yaml specify state.yaml with a preflight key; keeping one state file avoids duplication and matches the orchestrator persistence contract.
  - description: Added scripts/lib/orchestrator.js helper not explicitly in design
    reason: Pure state-machine functions are needed for deterministic YAML/unit tests and keep the orchestrator markdown thin.
  - description: Command wrappers updated in Slice 2 instead of Slice 3
    reason: User instructions explicitly requested command routing and registry command bindings as part of Slice 2 to wire the orchestrator end-to-end.
  - description: Orchestrator markdown kept mostly English with Spanish user-facing examples
    reason: The file is a technical agent artifact; only user-facing prompts/summaries are required to be Spanish per user instruction.

