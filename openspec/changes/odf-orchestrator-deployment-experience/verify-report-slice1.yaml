design_coherence:
  - decision: Single-file plugin refactor
    followed: true
    notes: plugins/odf-delegation.ts remains one file with internal sections.

  - decision: Real task() lives inside odf_delegate
    followed: true
    notes: createODFDelegate().execute() resolves agent/skills, then calls invokeTask(); findTaskApi probes toolCtx.task and client.task.

  - decision: Manual fallback for task()
    followed: true
    notes: buildFallbackOutput returns a marked instruction envelope with phase, agent, skills, and enriched prompt.

  - decision: Relative registry paths with absolute fallback
    followed: partial
    notes: resolvePath() is implemented and covered by tests; odf-registry.json paths themselves are not yet converted to relative (Slice 2).

  - decision: package metadata read
    followed: true
    notes: ODFRegistry type includes optional package and commands fields; legacy registries without them still load.

  - decision: Helper tools unchanged
    followed: true
    notes: createODFSkillInject, createODFSkillResolve, createODFRegistryRead, createODFNotebookLMLookup, createODFProfileSelect are unchanged except for registry type widening.

