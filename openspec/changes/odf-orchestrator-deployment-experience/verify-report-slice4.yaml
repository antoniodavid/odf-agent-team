spec_compliance_matrix:
  - capability: odf-installer
    requirements:
      - id: INST-01
        name: Idempotent installation
        status: COMPLIANT
        evidence: |
          install.sh merges directories, creates timestamped backups on re-run,
          and unit/YAML tests verify idempotency.

      - id: INST-02
        name: Prerequisites check
        status: COMPLIANT
        evidence: |
          install.sh checks python3, curl/wget, and Node.js 18+ when package.json
          is present. Unit tests verify Node < 18 would be rejected.

      - id: INST-03
        name: Deploy ODF pack files
        status: COMPLIANT
        evidence: |
          install.sh copies agent/, skills/, plugins/, command/, scripts/,
          openspec/, odf-registry.json, and package.json to the target directory.

      - id: INST-04
        name: Self-test on install
        status: COMPLIANT
        evidence: |
          install.sh runs node scripts/odf-test-runner.js after installation
          unless ODF_SKIP_SELFTEST is set.

      - id: INST-05
        name: package.json manifest
        status: COMPLIANT
        evidence: |
          package.json declares metadata, yaml dependency, test script, and
          plugin/sdk peer dependencies.

      - id: INST-06
        name: Non-interactive mode
        status: COMPLIANT
        evidence: |
          --yes flag and ODF_INSTALL_NONINTERACTIVE=1 skip the confirmation prompt.

  - capability: skill-registry
    requirements:
      - id: REG-01
        name: Relative paths
        status: COMPLIANT
        evidence: |
          Registry skill/agent/command paths are stored relative to the registry
          directory and resolve correctly in plugins/odf-delegation.ts and the
          validator.

      - id: REG-02
        name: Absolute path fallback
        status: COMPLIANT
        evidence: |
          resolvePath leaves absolute paths unchanged when they are inside the
          allowed roots; unit tests cover absolute legacy paths.

      - id: REG-03
        name: package.json metadata
        status: COMPLIANT
        evidence: |
          odf-registry.json has a package section with name, version, description,
          repository, and dependencies.

      - id: REG-04
        name: Plugin path resolution
        status: COMPLIANT
        evidence: |
          loadRegistry resolves skill and agent paths against the registry
          directory; tests validate resolution.

      - id: REG-05
        name: Registry refresh writes relative paths
        status: COMPLIANT_VIA_INSTRUCTION
        evidence: |
          command/odf-registry-refresh.md instructs the orchestrator to emit
          relative paths when use_relative_paths is true. No automated refresh
          test is included in this slice.

design_coherence:
  - topic: Installer idempotency
    status: ALIGNED
    notes: |
      Timestamped backups, directory merge, Node version check, npm install,
      and self-test match the installer design.

  - topic: Registry relative paths
    status: ALIGNED
    notes: |
      resolvePath() in the plugin already supported relative/absolute/~ paths;
      odf-registry.json now uses relative paths by default and exposes the
      use_relative_paths flag.

  - topic: Registry validation
    status: ALIGNED
    notes: |
      scripts/odf-registry-validate.js checks skills, agents, commands, and
      capabilities; relative paths are resolved against the registry directory.

security_risk_pass:
  status: passed
  findings:
    - area: Path traversal
      result: No unsafe traversal found.
      details: |
        resolvePath rejects ".." and confines resolved paths to allowed roots.
        install.sh only copies known ODF directories.

    - area: Shell injection
      result: No dynamic shell execution with user input.
      details: |
        install.sh uses cp/curl/wget with fixed directory names; user flags are
        parsed by case statement, not interpolated into shell commands.

    - area: Backup retention
      result: Backups are preserved on failure.
      details: |
        install.sh does not delete backups when self-test fails; rollback path
        is printed in the summary.

