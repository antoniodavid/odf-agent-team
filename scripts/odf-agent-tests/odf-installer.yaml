name: ODF Installer Scenarios
type: installer
tests:
  - name: dry-run shows plan without modifying
    input:
      args: ['--dry-run']
      env: {}
    expected:
      exit_code: 0
      stdout_contains:
        - 'Dry-run complete'
        - 'Target directory:'
        - 'Would install ODF files'

  - name: non-interactive install copies files to temp HOME
    input:
      args: ['--yes', '--force']
      env:
        ODF_SKIP_NPM: '1'
        ODF_SKIP_SELFTEST: '1'
    expected:
      exit_code: 0
      stdout_contains:
        - 'ODF Agent Team v1.0.0 — installed'
        - 'Skills:'
        - 'Agents:'
      files_exist:
        - .config/opencode/odf-registry.json
        - .config/opencode/plugins/odf-delegation.ts
        - .config/opencode/scripts/odf-test-runner.js
        - .config/opencode/command/odf-new.md

  - name: re-run is idempotent and creates a new backup
    input:
      runs: 2
      args: ['--yes', '--force']
      env:
        ODF_SKIP_NPM: '1'
        ODF_SKIP_SELFTEST: '1'
    expected:
      exit_code: 0
      stdout_contains:
        - 'ODF Agent Team v1.0.0 — installed'
      files_exist:
        - .config/opencode/odf-registry.json
      backup_count: 1
